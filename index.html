<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🐾 Guess the Animal!</title>
<style>
/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Segoe UI',system-ui,sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#667eea,#764ba2);
  display:flex;flex-direction:column;align-items:center;
  padding:24px 16px;
  color:#333;
}

/* ── Header ── */
.header{text-align:center;color:#fff;margin-bottom:20px}
.header h1{font-size:2rem;text-shadow:0 2px 10px rgba(0,0,0,.3);letter-spacing:.5px}
.header p{opacity:.85;font-size:.9rem;margin-top:4px}

/* ── Tab bar ── */
.tabs{display:flex;gap:10px;margin-bottom:18px}
.tab{
  padding:8px 26px;border-radius:999px;
  border:2px solid #fff;background:transparent;
  color:#fff;font-size:.9rem;font-weight:700;
  cursor:pointer;transition:all .2s
}
.tab.active,.tab:hover{background:#fff;color:#764ba2}

/* ── Card ── */
.card{
  background:#fff;border-radius:24px;
  box-shadow:0 20px 60px rgba(0,0,0,.22);
  width:100%;max-width:720px;padding:28px 28px 32px;
}

/* ════════════════════════════════
   TEACHER PANEL
════════════════════════════════ */
#teacher{display:block}
#game   {display:none}

.sec-title{
  font-size:1.05rem;font-weight:700;color:#764ba2;
  margin-bottom:12px;display:flex;align-items:center;gap:6px
}

/* Drop zone */
.drop-zone{
  border:3px dashed #c4b5fd;border-radius:16px;
  padding:38px 20px;text-align:center;
  cursor:pointer;background:#faf5ff;transition:all .2s;
  position:relative
}
.drop-zone:hover,.drop-zone.over{border-color:#764ba2;background:#f3e8ff}
.drop-zone .dz-icon{font-size:2.8rem}
.drop-zone p{color:#999;margin-top:8px;font-size:.9rem}
.drop-zone input{display:none}

/* Batch progress */
.batch-bar{
  display:none;margin-top:14px;
  background:#ede9fe;border-radius:10px;overflow:hidden;height:10px
}
.batch-fill{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);width:0%;transition:width .3s}

/* Thumbnail grid */
.thumb-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:10px;margin-top:14px
}
.thumb-item{
  border-radius:12px;overflow:hidden;
  border:2px solid #e0d7f7;position:relative;
  background:#f8f4ff;cursor:pointer;
}
.thumb-item img{width:100%;aspect-ratio:1;object-fit:cover;display:block;transition:filter .3s}
.thumb-item .sil-badge{
  position:absolute;bottom:4px;right:4px;
  background:rgba(118,75,162,.85);color:#fff;
  border-radius:6px;font-size:.65rem;padding:2px 5px;font-weight:700
}
.thumb-item .del-btn{
  position:absolute;top:4px;right:4px;
  background:rgba(239,68,68,.9);color:#fff;
  border:none;border-radius:50%;width:20px;height:20px;
  font-size:.7rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s
}
.thumb-item:hover .del-btn{opacity:1}
.thumb-item.processing img{filter:brightness(.5)}
.thumb-item .spinner-mini{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;animation:spin .8s linear infinite;display:none
}
.thumb-item.processing .spinner-mini{display:flex}
@keyframes spin{to{transform:rotate(360deg)}}

/* Start button */
.btn-start{
  margin-top:22px;width:100%;padding:14px;
  border-radius:14px;border:none;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;font-size:1.1rem;font-weight:700;
  cursor:pointer;box-shadow:0 6px 20px rgba(118,75,162,.4);
  transition:transform .15s,box-shadow .15s
}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(118,75,162,.5)}
.btn-start:disabled{opacity:.45;cursor:not-allowed;transform:none}

/* ════════════════════════════════
   GAME PANEL
════════════════════════════════ */
/* Top bar */
.game-topbar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;flex-wrap:wrap;gap:8px
}
.card-counter{
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;border-radius:999px;padding:5px 16px;
  font-size:.85rem;font-weight:700
}
.nav-btns{display:flex;gap:8px}
.nav-btn{
  width:40px;height:40px;border-radius:50%;
  border:2px solid #764ba2;background:#fff;
  color:#764ba2;font-size:1.1rem;font-weight:700;
  cursor:pointer;transition:all .15s;
  display:flex;align-items:center;justify-content:center
}
.nav-btn:hover:not(:disabled){background:#764ba2;color:#fff}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}

/* Stage */
.stage{
  position:relative;border-radius:20px;
  overflow:hidden;background:#f0ebff;
  width:100%;aspect-ratio:4/3;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;user-select:none;
  box-shadow:0 4px 24px rgba(118,75,162,.12)
}
.stage-img{
  max-width:100%;max-height:100%;
  object-fit:contain;display:block;
  transition:filter .5s ease,opacity .5s ease;
  pointer-events:none
}
/* silhouette state */
.stage-img.sil{filter:brightness(0);opacity:.88}
/* revealed state */
.stage-img.revealed{filter:none;opacity:1}

/* Click hint overlay */
.click-hint{
  position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  background:rgba(118,75,162,.75);color:#fff;
  border-radius:999px;padding:6px 18px;font-size:.82rem;font-weight:600;
  pointer-events:none;transition:opacity .3s;white-space:nowrap
}

/* Reveal flash */
.flash{
  position:absolute;inset:0;
  background:radial-gradient(circle,rgba(255,215,0,.5),transparent 70%);
  opacity:0;pointer-events:none;border-radius:20px;
  transition:opacity .15s
}
.flash.go{opacity:1}

/* Stars */
.stars-wrap{position:fixed;inset:0;pointer-events:none;z-index:9999}
.star{
  position:absolute;font-size:1.8rem;
  animation:floatUp 1.4s ease-out forwards
}
@keyframes floatUp{
  0%  {transform:translateY(0) scale(.5) rotate(0deg);opacity:1}
  100%{transform:translateY(-180px) scale(1.4) rotate(540deg);opacity:0}
}

/* Dot strip */
.dot-strip{
  display:flex;justify-content:center;gap:6px;
  margin-top:14px;flex-wrap:wrap
}
.dot{
  width:10px;height:10px;border-radius:50%;
  background:#e0d7f7;transition:background .3s,transform .3s;
  cursor:pointer
}
.dot.active{background:#764ba2;transform:scale(1.35)}
.dot.done{background:#a78bfa}

/* Back btn */
.btn-back{
  margin-top:16px;padding:9px 22px;border-radius:10px;
  border:2px solid #764ba2;background:#fff;color:#764ba2;
  font-weight:700;font-size:.88rem;cursor:pointer;transition:all .15s
}
.btn-back:hover{background:#764ba2;color:#fff}

/* Shuffle btn */
.btn-shuffle{
  padding:9px 22px;border-radius:10px;
  border:none;background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;font-weight:700;font-size:.88rem;cursor:pointer;transition:opacity .15s
}
.btn-shuffle:hover{opacity:.85}

/* ── Responsive ── */
@media(max-width:480px){
  .card{padding:18px 14px}
  .header h1{font-size:1.6rem}
  .thumb-grid{grid-template-columns:repeat(auto-fill,minmax(90px,1fr))}
}
</style>
</head>
<body>

<div class="stars-wrap" id="starsWrap"></div>

<div class="header">
  <h1>🐾 Guess the Animal!</h1>
  <p>Upload photos → silhouette quiz for your class 🎓</p>
</div>

<div class="tabs">
  <button class="tab active" id="tabTeacher" onclick="showPanel('teacher')">👩‍🏫 Teacher</button>
  <button class="tab"        id="tabGame"    onclick="showPanel('game')">🎮 Game</button>
</div>

<div class="card">

  <!-- ══════════ TEACHER ══════════ -->
  <div id="teacher">
    <div class="sec-title">📸 Upload Animal Photos</div>

    <div class="drop-zone" id="dropZone"
         onclick="document.getElementById('fileIn').click()"
         ondragover="dzOver(event)"
         ondragleave="dzLeave()"
         ondrop="dzDrop(event)">
      <div class="dz-icon">🖼️</div>
      <p>Click or drag &amp; drop — supports multiple files</p>
      <p style="font-size:.78rem;margin-top:3px;color:#ccc">JPG · PNG · WEBP</p>
      <input type="file" id="fileIn" accept="image/*" multiple onchange="handleFiles(event.target.files)"/>
    </div>

    <div class="batch-bar" id="batchBar"><div class="batch-fill" id="batchFill"></div></div>

    <div class="thumb-grid" id="thumbGrid"></div>

    <button class="btn-start" id="btnStart" onclick="startGame()" disabled>
      🚀 Start Game  (<span id="readyCount">0</span> photos ready)
    </button>
  </div>

  <!-- ══════════ GAME ══════════ -->
  <div id="game">

    <div class="game-topbar">
      <div style="display:flex;gap:8px">
        <button class="btn-back"    onclick="showPanel('teacher')">← Edit</button>
        <button class="btn-shuffle" onclick="shuffleCards()">🔀 Shuffle</button>
      </div>
      <div class="card-counter" id="cardCounter">1 / 1</div>
      <div class="nav-btns">
        <button class="nav-btn" id="btnPrev" onclick="navigate(-1)">‹</button>
        <button class="nav-btn" id="btnNext" onclick="navigate(1)">›</button>
      </div>
    </div>

    <!-- Image stage — click to reveal -->
    <div class="stage" id="stage" onclick="reveal()">
      <img id="stageImg" class="stage-img sil" src="" alt=""/>
      <div class="flash" id="flash"></div>
      <div class="click-hint" id="clickHint">👆 Click to reveal!</div>
    </div>

    <!-- Dot navigation -->
    <div class="dot-strip" id="dotStrip"></div>

  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let cards   = [];  // [{original, silhouette, name, done}]
let current = 0;

// ═══════════════════════════════════════════════
// PANEL SWITCH
// ═══════════════════════════════════════════════
function showPanel(p) {
  document.getElementById('teacher').style.display = p === 'teacher' ? 'block' : 'none';
  document.getElementById('game')   .style.display = p === 'game'    ? 'block' : 'none';
  document.getElementById('tabTeacher').classList.toggle('active', p === 'teacher');
  document.getElementById('tabGame')   .classList.toggle('active', p === 'game');
}

// ═══════════════════════════════════════════════
// DROP ZONE
// ═══════════════════════════════════════════════
function dzOver(e)  { e.preventDefault(); document.getElementById('dropZone').classList.add('over'); }
function dzLeave()  { document.getElementById('dropZone').classList.remove('over'); }
function dzDrop(e)  { e.preventDefault(); dzLeave(); handleFiles(e.dataTransfer.files); }

// ═══════════════════════════════════════════════
// FILE HANDLING
// ═══════════════════════════════════════════════
async function handleFiles(files) {
  const arr = Array.from(files).filter(f => f.type.startsWith('image/'));
  if (!arr.length) return;

  const bar  = document.getElementById('batchBar');
  const fill = document.getElementById('batchFill');
  bar.style.display = 'block';

  for (let i = 0; i < arr.length; i++) {
    fill.style.width = ((i / arr.length) * 100) + '%';
    await addCard(arr[i]);
  }

  fill.style.width = '100%';
  setTimeout(() => { bar.style.display = 'none'; fill.style.width = '0%'; }, 600);
  updateStartBtn();
}

async function addCard(file) {
  const idx  = cards.length;
  const name = file.name.replace(/\.[^.]+$/, '');
  cards.push({ original: null, silhouette: null, name, done: false });
  renderThumb(idx);

  // Read file
  const original = await readFileAsDataURL(file);
  cards[idx].original = original;

  // Mark processing
  const item = document.getElementById('thumb-' + idx);
  item.classList.add('processing');
  item.querySelector('.spinner-mini').style.display = 'flex';

  // Generate silhouette
  try {
    cards[idx].silhouette = await makeSilhouette(original);
  } catch(e) {
    cards[idx].silhouette = original;
  }
  cards[idx].done = true;

  // Update thumb
  item.classList.remove('processing');
  item.querySelector('.spinner-mini').style.display = 'none';
  item.querySelector('img').src = cards[idx].silhouette;
  item.querySelector('.sil-badge').textContent = '✓ ready';

  updateStartBtn();
}

function readFileAsDataURL(file) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.readAsDataURL(file);
  });
}

// ═══════════════════════════════════════════════
// THUMBNAIL RENDERING
// ═══════════════════════════════════════════════
function renderThumb(idx) {
  const card = cards[idx];
  const grid = document.getElementById('thumbGrid');
  const div  = document.createElement('div');
  div.className = 'thumb-item processing';
  div.id = 'thumb-' + idx;
  div.innerHTML = `
    <img src="${card.original || ''}" alt=""/>
    <div class="spinner-mini">⏳</div>
    <span class="sil-badge">processing…</span>
    <button class="del-btn" onclick="deleteCard(${idx},event)">✕</button>
  `;
  grid.appendChild(div);
}

function deleteCard(idx, e) {
  e.stopPropagation();
  cards.splice(idx, 1);
  rebuildThumbs();
  updateStartBtn();
}

function rebuildThumbs() {
  const grid = document.getElementById('thumbGrid');
  grid.innerHTML = '';
  cards.forEach((_, i) => {
    const div = document.createElement('div');
    div.className = 'thumb-item';
    div.id = 'thumb-' + i;
    div.innerHTML = `
      <img src="${cards[i].silhouette || cards[i].original || ''}" alt=""/>
      <div class="spinner-mini" style="display:none">⏳</div>
      <span class="sil-badge">${cards[i].done ? '✓ ready' : 'processing…'}</span>
      <button class="del-btn" onclick="deleteCard(${i},event)">✕</button>
    `;
    if (!cards[i].done) div.classList.add('processing');
    grid.appendChild(div);
  });
}

function updateStartBtn() {
  const ready = cards.filter(c => c.done).length;
  document.getElementById('readyCount').textContent = ready;
  document.getElementById('btnStart').disabled = ready === 0;
}

// ═══════════════════════════════════════════════
// BACKGROUND REMOVAL → pure silhouette (black)
// ═══════════════════════════════════════════════
function makeSilhouette(dataURL) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const W = img.naturalWidth, H = img.naturalHeight;
      const canvas = document.createElement('canvas');
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);

      const id   = ctx.getImageData(0, 0, W, H);
      const data = id.data;

      // Sample border pixels as background color
      const samples = [];
      for (let x = 0; x < W; x += Math.max(1, Math.floor(W/20))) {
        samples.push(px(data, W, x, 0), px(data, W, x, H-1));
      }
      for (let y = 0; y < H; y += Math.max(1, Math.floor(H/20))) {
        samples.push(px(data, W, 0, y), px(data, W, W-1, y));
      }

      const THRESH = 50;
      const visited = new Uint8Array(W * H);
      const queue   = [];

      // Seed from all border pixels
      for (let x = 0; x < W; x++) { queue.push(x, 0); queue.push(x, H-1); }
      for (let y = 1; y < H-1; y++) { queue.push(0, y); queue.push(W-1, y); }

      let head = 0;
      while (head < queue.length) {
        const cx = queue[head++], cy = queue[head++];
        if (cx < 0 || cy < 0 || cx >= W || cy >= H) continue;
        const idx = cy * W + cx;
        if (visited[idx]) continue;
        visited[idx] = 1;
        const p = px(data, W, cx, cy);
        if (p[3] < 10 || samples.some(s => colorDist(p, s) < THRESH)) {
          data[idx*4+3] = 0;
          queue.push(cx-1,cy, cx+1,cy, cx,cy-1, cx,cy+1);
        }
      }

      // Paint foreground pixels black
      for (let i = 0; i < W * H; i++) {
        if (data[i*4+3] > 20) {
          data[i*4]   = 0;
          data[i*4+1] = 0;
          data[i*4+2] = 0;
          data[i*4+3] = 255;
        }
      }

      ctx.putImageData(id, 0, 0);
      resolve(canvas.toDataURL('image/png'));
    };
    img.src = dataURL;
  });
}

function px(data, W, x, y) {
  const i = (y * W + x) * 4;
  return [data[i], data[i+1], data[i+2], data[i+3]];
}
function colorDist(a, b) {
  return Math.sqrt((a[0]-b[0])**2+(a[1]-b[1])**2+(a[2]-b[2])**2);
}

// ═══════════════════════════════════════════════
// START / RENDER GAME
// ═══════════════════════════════════════════════
function startGame() {
  current = 0;
  cards.forEach(c => c.revealed = false);
  showPanel('game');
  renderCard();
  buildDots();
}

function renderCard() {
  const c   = cards[current];
  const img = document.getElementById('stageImg');

  // Reset to silhouette
  img.src = c.silhouette || c.original;
  img.className = 'stage-img sil';

  document.getElementById('flash').classList.remove('go');
  document.getElementById('clickHint').style.opacity = c.revealed ? '0' : '1';

  // If already revealed during this session, show original
  if (c.revealed) {
    img.src = c.original;
    img.className = 'stage-img revealed';
    document.getElementById('clickHint').style.opacity = '0';
  }

  updateCounter();
  updateDots();
  updateNav();
}

// ═══════════════════════════════════════════════
// REVEAL on click
// ═══════════════════════════════════════════════
function reveal() {
  const c = cards[current];
  if (c.revealed) return;
  c.revealed = true;

  const img = document.getElementById('stageImg');
  img.src = c.original;
  img.className = 'stage-img revealed';
  document.getElementById('clickHint').style.opacity = '0';

  // Flash
  const flash = document.getElementById('flash');
  flash.classList.add('go');
  setTimeout(() => flash.classList.remove('go'), 300);

  // Stars
  spawnStars();
  updateDots();
}

// ═══════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════
function navigate(dir) {
  const next = current + dir;
  if (next < 0 || next >= cards.length) return;
  current = next;
  renderCard();
}

function updateNav() {
  document.getElementById('btnPrev').disabled = current === 0;
  document.getElementById('btnNext').disabled = current === cards.length - 1;
}

function updateCounter() {
  document.getElementById('cardCounter').textContent = `${current+1} / ${cards.length}`;
}

// ═══════════════════════════════════════════════
// DOT NAVIGATION
// ═══════════════════════════════════════════════
function buildDots() {
  const strip = document.getElementById('dotStrip');
  strip.innerHTML = '';
  cards.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot';
    d.onclick = () => { current = i; renderCard(); };
    strip.appendChild(d);
  });
  updateDots();
}

function updateDots() {
  const dots = document.getElementById('dotStrip').children;
  for (let i = 0; i < dots.length; i++) {
    dots[i].className = 'dot' +
      (i === current ? ' active' : '') +
      (cards[i].revealed ? ' done' : '');
  }
}

// ═══════════════════════════════════════════════
// SHUFFLE
// ═══════════════════════════════════════════════
function shuffleCards() {
  for (let i = cards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cards[i], cards[j]] = [cards[j], cards[i]];
  }
  current = 0;
  cards.forEach(c => c.revealed = false);
  renderCard();
  buildDots();
}

// ═══════════════════════════════════════════════
// STARS
// ═══════════════════════════════════════════════
function spawnStars() {
  const wrap  = document.getElementById('starsWrap');
  const picks = ['⭐','🌟','✨','🎉','🐾','🦁','🐘','🐬'];
  for (let i = 0; i < 14; i++) {
    setTimeout(() => {
      const s = document.createElement('div');
      s.className = 'star';
      s.textContent = picks[Math.floor(Math.random() * picks.length)];
      s.style.left = Math.random() * 100 + 'vw';
      s.style.top  = (50 + Math.random() * 40) + 'vh';
      s.style.animationDuration = (.9 + Math.random() * .8) + 's';
      wrap.appendChild(s);
      setTimeout(() => s.remove(), 2000);
    }, i * 70);
  }
}

// ═══════════════════════════════════════════════
// KEYBOARD SHORTCUT: ← → Space
// ═══════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (document.getElementById('game').style.display === 'none') return;
  if (e.key === 'ArrowRight') navigate(1);
  else if (e.key === 'ArrowLeft') navigate(-1);
  else if (e.key === ' ') { e.preventDefault(); reveal(); }
});
</script>
</body>
</html>
